name: Release

on:
  push:
    tags:
      - 'v*' # Trigger when pushing version tags (e.g., v0.0.1)

permissions:
  contents: write # Permission required to publish releases and upload files

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install rpmbuild
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Run Tests
        run: make test

      - name: Build Binary and Packages
        run: make package

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            nspect_*_amd64.deb
            nspect-*-1.x86_64.rpm
            nspect
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
